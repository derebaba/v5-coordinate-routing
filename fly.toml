# Fly.io deployment manifest for Share Service API (Phase 4).
# App-specific values (like `app`) can be set by `fly launch --no-deploy`.
app = "replace-with-your-fly-app-name"
primary_region = "fra"

[build]
  dockerfile = "backend/ShareService.Api/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"

# Production configuration is injected with `fly secrets set`.
# Use ASP.NET environment key format with double-underscores, e.g.
# Mongo__ConnectionString, Mongo__DatabaseName, Auth__JwtSecret, Cors__AllowedOrigins.
