# fly.toml app configuration file generated for v5-coordinate-routing on 2026-03-22T09:01:50Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'v5-coordinate-routing'
primary_region = 'fra'

[build]
  dockerfile = 'backend/ShareService.Api/Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
